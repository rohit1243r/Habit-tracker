<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <h1>Monthly Habit Tracker</h1>
            <div class="header-inputs">
                <div class="input-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" placeholder="Your Name" maxlength="50">
                </div>
                <div class="input-group">
                    <label for="month">Month:</label>
                    <input type="text" id="month" placeholder="e.g., March 2026" maxlength="50">
                </div>
            </div>
        </div>

        <!-- Habits Table -->
        <div class="table-wrapper">
            <table class="habit-table">
                <thead>
                    <tr>
                        <th class="habit-header">Habits / Protocols</th>
                        <th id="day-headers" colspan="31">
                            <!-- Days will be generated by JavaScript -->
                        </th>
                    </tr>
                </thead>
                <tbody id="habit-table-body">
                    <!-- Habit rows will be generated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Progress Section -->
        <div class="progress-section">
            <h2>Daily Progress</h2>
            <div class="daily-scores" id="daily-scores">
                <!-- Daily scores will be generated by JavaScript -->
            </div>
        </div>

        <!-- Progress Graph -->
        <div class="graph-section">
            <h2>Progress Graph</h2>
            <canvas id="progressChart" width="1000" height="300"></canvas>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-reset" onclick="resetAllHabits()">Reset All</button>
            <button class="btn btn-print" onclick="window.print()">Print</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
